<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 280px;
        background: #0e0e18;
        color: #d0d0e8;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        padding: 16px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .header h1 {
        font-size: 14px;
        font-weight: 600;
      }
      .toggle {
        position: relative;
        width: 40px;
        height: 22px;
        cursor: pointer;
      }
      .toggle input {
        display: none;
      }
      .toggle .track {
        position: absolute;
        inset: 0;
        background: #2a2a44;
        border-radius: 11px;
        transition: background 0.2s;
      }
      .toggle input:checked + .track {
        background: #6366f1;
      }
      .toggle .thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        background: #e0e0f0;
        border-radius: 50%;
        transition: transform 0.2s;
        pointer-events: none;
      }
      .toggle input:checked ~ .thumb {
        transform: translateX(18px);
      }
      .shaders {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-bottom: 14px;
      }
      .shader-btn {
        padding: 10px 8px;
        background: #1a1a2e;
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        color: #9898b8;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
      }
      .shader-btn:hover {
        background: #222240;
        color: #c0c0e0;
      }
      .shader-btn.active {
        border-color: #6366f1;
        background: rgba(99, 102, 241, 0.12);
        color: #a5b4fc;
      }
      .shader-btn .icon {
        display: block;
        font-size: 18px;
        margin-bottom: 3px;
      }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .control-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .control-row label {
        flex: 0 0 60px;
        font-size: 11px;
        color: #7878a0;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .control-row input[type='range'] {
        flex: 1;
        -webkit-appearance: none;
        height: 4px;
        background: #2a2a44;
        border-radius: 2px;
        outline: none;
      }
      .control-row input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #6366f1;
        border-radius: 50%;
        cursor: pointer;
      }
      .control-row .val {
        flex: 0 0 30px;
        text-align: right;
        font-size: 11px;
        color: #6668a0;
        font-variant-numeric: tabular-nums;
      }
      .hint {
        margin-top: 12px;
        font-size: 10px;
        color: #4a4a6a;
        text-align: center;
        line-height: 1.5;
      }
      .hint code {
        font-size: 9px;
        background: #1a1a2e;
        padding: 1px 4px;
        border-radius: 3px;
        color: #6366f1;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Shader Overlay</h1>
      <label class="toggle">
        <input type="checkbox" id="toggle" />
        <span class="track"></span>
        <span class="thumb"></span>
      </label>
    </div>

    <div class="shaders" id="shaders">
      <button class="shader-btn active" data-shader="crt">
        <span class="icon">&#x1F4FA;</span>CRT
      </button>
      <button class="shader-btn" data-shader="underwater">
        <span class="icon">&#x1F30A;</span>Underwater
      </button>
      <button class="shader-btn" data-shader="vhs">
        <span class="icon">&#x1F4FC;</span>VHS Glitch
      </button>
      <button class="shader-btn" data-shader="nightvision">
        <span class="icon">&#x1F52D;</span>Night Vision
      </button>
      <button class="shader-btn" data-shader="pixelate">
        <span class="icon">&#x1F7E9;</span>Pixelate
      </button>
      <button class="shader-btn" data-shader="thermal">
        <span class="icon">&#x1F321;&#xFE0F;</span>Thermal
      </button>
    </div>

    <div class="controls">
      <div class="control-row">
        <label>Intensity</label>
        <input type="range" id="intensity" min="0" max="100" value="80" />
        <span class="val" id="intensity-val">80%</span>
      </div>
      <div class="control-row">
        <label>Speed</label>
        <input type="range" id="speed" min="0" max="100" value="50" />
        <span class="val" id="speed-val">50%</span>
      </div>
    </div>

    <p class="hint">
      Requires Chrome Canary with<br /><code
        >chrome://flags/#canvas-draw-element</code
      >
    </p>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
