<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRT Hit Test Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #f0f0f0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(6, 1fr);
      height: 100vh;
      gap: 2px;
      padding: 2px;
    }
    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      border: 1px solid rgba(0,0,0,0.1);
      user-select: none;
    }
    .cell:hover {
      transform: scale(0.96);
      filter: brightness(1.2);
    }
    .cell:active {
      transform: scale(0.92);
    }
    .cell.clicked {
      animation: flash 0.4s ease;
    }
    @keyframes flash {
      0% { filter: brightness(2); }
      100% { filter: brightness(1); }
    }
    #log {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-size: 12px;
      padding: 8px 12px;
      max-height: 120px;
      overflow-y: auto;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <div id="log">Click any cell. Hover should highlight.</div>
  <script>
    const colors = [
      '#ff6b6b','#ffa06b','#ffd06b','#a8e06b',
      '#6be0a8','#6bcaff','#6b8aff','#b06bff',
      '#ff6bca','#ff8888','#ffbb88','#ffee88',
      '#88eebb','#88ddff','#88aaff','#cc88ff',
      '#ff88bb','#e07070','#e0a070','#e0d070',
      '#70c070','#70b0e0','#7080e0','#a070e0',
    ];
    const grid = document.getElementById('grid');
    const log = document.getElementById('log');
    const rows = 6, cols = 4;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.background = colors[idx % colors.length];
        cell.textContent = `R${r} C${c}`;
        cell.addEventListener('click', () => {
          cell.classList.remove('clicked');
          void cell.offsetWidth;
          cell.classList.add('clicked');
          const msg = `CLICK R${r} C${c} (${cell.getBoundingClientRect().left.toFixed(0)}, ${cell.getBoundingClientRect().top.toFixed(0)})`;
          log.textContent = msg;
          console.log(msg);
        });
        cell.addEventListener('mouseenter', () => {
          const msg = `HOVER R${r} C${c}`;
          log.textContent = msg;
        });
        grid.appendChild(cell);
      }
    }
  </script>
</body>
</html>
